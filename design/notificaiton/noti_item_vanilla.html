<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <style>
        /* CSS Phân cấp & Typography */
        .noti-item-root {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            display: flex;
            gap: 16px;
            padding: 16px 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.2s ease;
            position: relative;
            min-height: 80px;
            box-sizing: border-box;
        }

        .noti-item-root:hover {
            background-color: #fbfbfb;
        }

        /* 1. Khu vực Indicator (Trái) */
        .noti-indicator-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            padding-top: 6px;
        }

        .unread-dot {
            width: 6px;
            height: 6px;
            background-color: #3b82f6;
            border-radius: 50%;
            margin-bottom: 12px;
        }

        .noti-icon-box {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background-color: #f0fdf4; /* Emerald 50 */
            border: 1px solid #dcfce7; /* Emerald 100 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 2. Khu vực Nội dung (Giữa) */
        .noti-content-zone {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .noti-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .status-badge {
            font-size: 9px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            color: #166534; /* Green 800 */
            background-color: #f0fdf4;
            border: 1px solid #dcfce7;
        }

        .category-tag {
            font-size: 10px;
            font-weight: 600;
            color: #cbd5e1; /* Slate 300 */
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .noti-title {
            font-size: 13px;
            font-weight: 700;
            color: #0f172a;
            margin: 0 0 4px 0;
            line-height: 1.4;
        }

        .noti-description {
            font-size: 12px;
            color: #64748b;
            margin: 0;
            line-height: 1.5;
        }

        /* Highlight mã chứng từ (Xử lý thẻ <b> từ backend) */
        .noti-description b {
            font-weight: 600;
            color: #1e293b !important;
            background-color: #f1f5f9;
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95em;
            border: 1px solid #e2e8f0;
        }

        /* 3. Khu vực Hành động (Phải - Căn dọc) */
        .noti-action-zone {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-end;
            flex-shrink: 0;
            padding: 2px 0;
        }

        .menu-dot-btn {
            background: none;
            border: none;
            padding: 4px;
            color: #cbd5e1;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-dot-btn:hover {
            background-color: #f1f5f9;
            color: #64748b;
        }

        .noti-timestamp {
            font-size: 10px;
            font-weight: 600;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <!-- Một dòng thông báo mẫu -->
    <div class="noti-item-root">
        <!-- 1. Trái: Chỉ báo trạng thái & Icon -->
        <div class="noti-indicator-zone">
            <div class="unread-dot"></div>
            <div class="noti-icon-box">
                <!-- Icon SVG (Thay thế cho Lucide) -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg>
            </div>
        </div>
        
        <!-- 2. Giữa: Nội dung thông báo -->
        <div class="noti-content-zone">
            <div class="noti-meta-row">
                <span class="status-badge">Đã duyệt</span>
                <span class="category-tag">Chứng từ</span>
            </div>
            <h4 class="noti-title">Hoàn thành duyệt Chứng từ công nợ phải trả</h4>
            <p class="noti-description">
                support.gc Đã duyệt chứng từ <b style="color:rgb(214, 59, 37);">PHT-2503/0011</b>
            </p>
        </div>

        <!-- 3. Phải: Menu và Thời gian (Thẳng hàng dọc) -->
        <div class="noti-action-zone">
            <button class="menu-dot-btn" title="Thêm hành động">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            </button>
            <div class="noti-timestamp">12:30 PM</div>
        </div>
    </div>

</body>
</html>
