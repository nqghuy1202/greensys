/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function parseDate(str) {
  const [dp, tp] = str.split(' ');
  const [d, m, y] = dp.split('/').map(Number);
  const [h, mn]   = tp.split(':').map(Number);
  return new Date(y, m - 1, d, h, mn);
}

function relTime(str) {
  const diff = NOW - parseDate(str);
  const mins = Math.floor(diff / 60000);
  const hrs  = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (mins < 1)   return 'Vừa xong';
  if (mins < 60)  return `${mins} phút trước`;
  if (hrs  < 24)  return `${hrs} giờ trước`;
  if (days === 1) return 'Hôm qua';
  if (days < 7)   return `${days} ngày trước`;
  if (days < 30)  return `${Math.floor(days / 7)} tuần trước`;
  if (days < 365) return `${Math.floor(days / 30)} tháng trước`;
  return `${Math.floor(days / 365)} năm trước`;
}

function groupKey(str) {
  const days = Math.floor((NOW - parseDate(str)) / 86400000);
  if (days === 0) return 'HÔM NAY';
  if (days === 1) return 'HÔM QUA';
  if (days < 7)   return 'TUẦN NÀY';
  if (days < 30)  return 'THÁNG NÀY';
  if (days < 60)  return 'THÁNG TRƯỚC';
  return 'CŨ HƠN';
}

const GROUP_ORDER = ['HÔM NAY', 'HÔM QUA', 'TUẦN NÀY', 'THÁNG NÀY', 'THÁNG TRƯỚC', 'CŨ HƠN'];

            <div style={{width:6,height:6,borderRadius:'50%',

/* ══════════════════════════════════════════
   MAIN PANEL
══════════════════════════════════════════ */
function NotifPanel() {
  const [data,   setData]   = React.useState(RAW);
  const [search, setSearch] = React.useState('');
  const [tab,    setTab]    = React.useState('all');

  const unread = data.filter(n => !n.read).length;

  const counts = React.useMemo(() => ({
    all:        data.length,
    cho_duyet:  data.filter(n => n.type === 'cho_duyet').length,
    hoan_thanh: data.filter(n => n.type === 'hoan_thanh').length,
    quy_trinh:  data.filter(n => n.type === 'quy_trinh').length,
  }), [data]);

  const filtered = React.useMemo(() => {
    let d = data;
    if (tab !== 'all') d = d.filter(n => n.type === tab);
    if (search) {
      const q = search.toLowerCase();
      d = d.filter(n =>
        n.nv.toLowerCase().includes(q) ||
        n.code.toLowerCase().includes(q) ||
        (n.sender || '').toLowerCase().includes(q)
      );
    }
    return d;
  }, [data, tab, search]);

  const grouped = React.useMemo(() => {
    const map = {};
    filtered.forEach(n => {
      const k = groupKey(n.time);
      if (!map[k]) map[k] = [];
      map[k].push(n);
    });
    return GROUP_ORDER.filter(k => map[k]).map(k => ({label: k, items: map[k]}));
  }, [filtered]);

  const markAll  = () => setData(d => d.map(n => ({...n, read: true})));
  const markRead = id => setData(d => d.map(n => n.id === id ? {...n, read: true} : n));
  const remove   = id => setData(d => d.filter(n => n.id !== id));

  const isFiltered = !!(search || tab !== 'all');

  return (
    <div style={{
      position:'absolute', right:0, top:0, bottom:0, width:460,
      background:'#fff', display:'flex', flexDirection:'column',
      boxShadow:'-8px 0 48px rgba(0,0,0,.18)',
      fontFamily:"'Plus Jakarta Sans',sans-serif",
    }}>

      {/* ════ HEADER ════ */}
      <div style={{padding:'14px 16px 0', flexShrink:0, borderBottom:'1px solid #F0F0F0'}}>

        {/* Top row: Bell + Title + Actions */}
        <div style={{display:'flex', alignItems:'center', gap:9, marginBottom:12}}>
          <div style={{
            width:34, height:34, borderRadius:9,
            background:'#E1F0EB', color:'#15674C',
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
          }}>
            <IBell/>
          </div>
          <div>
            <div style={{display:'flex', alignItems:'center', gap:7}}>
              <span style={{fontSize:14, fontWeight:800, color:'#111827', letterSpacing:'-0.3px'}}>
                THÔNG BÁO
              </span>
              {unread > 0 && (
                <span style={{
                  background:'#15674C', color:'#fff',
                  fontSize:10, fontWeight:800, letterSpacing:'.03em',
                  padding:'2px 8px', borderRadius:99, lineHeight:1.6,
                }}>
                  {unread} mới
                </span>
              )}
            </div>
            <div style={{fontSize:11, color:'#9CA3AF', marginTop:1, fontWeight:500}}>
              {unread > 0
                ? <span>{unread} chưa đọc · {data.length} tổng</span>
                : <span style={{color:'#15674C', fontWeight:600}}>✓ Tất cả đã đọc</span>}
            </div>
          </div>
          <div style={{marginLeft:'auto', display:'flex', gap:5, alignItems:'center'}}>
            {unread > 0 && (
              <button
                onClick={markAll}
                style={{
                  display:'flex', alignItems:'center', gap:5,
                  fontSize:11, fontWeight:700, color:'#15674C',
                  background:'#E1F0EB', border:'1px solid #A8D5C2',
                  borderRadius:7, padding:'6px 11px', cursor:'pointer',
                  transition:'background .12s',
                }}
                onMouseEnter={e=>e.currentTarget.style.background='#C5E8D8'}
                onMouseLeave={e=>e.currentTarget.style.background='#E1F0EB'}
              >
                <IDblChk/>Đọc tất cả
              </button>
            )}
            <button style={{
              width:30, height:30, borderRadius:7, border:'1.5px solid #E5E7EB',
              background:'#fff', color:'#6B7280', cursor:'pointer',
              display:'flex', alignItems:'center', justifyContent:'center',
              transition:'background .12s',
            }}
              onMouseEnter={e=>e.currentTarget.style.background='#F3F4F6'}
              onMouseLeave={e=>e.currentTarget.style.background='#fff'}
            >
              <IClose/>
            </button>
          </div>
        </div>

        {/* Search bar */}
        <div style={{position:'relative'}}>
          <span style={{
            position:'absolute', left:10, top:'50%', transform:'translateY(-50%)',
            color:'#9CA3AF', display:'flex', pointerEvents:'none',
          }}>
            <ISearch/>
          </span>
          <input
            type="text"
            placeholder="Tìm kiếm thông báo..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{
              width:'100%', padding:'8px 32px 8px 32px',
              border:'1.5px solid #E5E7EB', borderRadius:8,
              fontSize:12, color:'#374151', background:'#F9FAFB',
              outline:'none', transition:'border-color .15s,background .15s',
            }}
            onFocus={e=>{e.target.style.borderColor='#15674C';e.target.style.background='#fff'}}
            onBlur={e=>{e.target.style.borderColor='#E5E7EB';e.target.style.background='#F9FAFB'}}
          />
          {search && (
            <button
              onClick={()=>setSearch('')}
              style={{
                position:'absolute', right:8, top:'50%', transform:'translateY(-50%)',
                background:'none', border:'none', cursor:'pointer',
                color:'#9CA3AF', display:'flex', padding:2,
              }}
            >
              <IClose/>
            </button>
          )}
        </div>

        {/* Tab filters */}
        <div style={{
          display:'flex', marginTop:8,
          marginLeft:-16, marginRight:-16, paddingLeft:4,
          borderTop:'1px solid #F3F4F6',
        }}>
          {TABS.map(t => (
            <button
              key={t.id}
              className={`tab-btn${tab === t.id ? ' active' : ''}`}
              onClick={()=>setTab(t.id)}
            >
              {t.label}
              <span style={{
                display:'inline-block', marginLeft:5,
                fontSize:10, fontWeight:700, lineHeight:1.5,
                background: tab === t.id ? '#15674C' : '#F3F4F6',
                color:      tab === t.id ? '#fff'    : '#9CA3AF',
                padding:'0 5px', borderRadius:99,
                transition:'background .15s, color .15s',
              }}>
                {counts[t.id]}
              </span>
            </button>
          ))}
        </div>
      </div>

      {/* ════ LIST ════ */}
      <div className="notif-scroll" style={{flex:1, overflowY:'auto'}}>
        {grouped.length === 0 ? (
          <EmptyState
            isFiltered={isFiltered}
            onClear={()=>{setSearch('');setTab('all')}}
          />
        ) : grouped.map(({label, items}) => (
          <React.Fragment key={label}>
            <SectionLabel label={label}/>
            {items.map(n => (
              <NotifItem
                key={n.id}
                n={n}
                onMarkRead={markRead}
                onRemove={remove}
              />
            ))}
          </React.Fragment>
        ))}
      </div>

      {/* ════ FOOTER ════ */}
      <div style={{
        padding:'9px 16px', borderTop:'1px solid #F0F0F0',
        background:'#FAFAFA', flexShrink:0,
        display:'flex', alignItems:'center', justifyContent:'space-between',
      }}>
        <span style={{fontSize:11, color:'#9CA3AF', fontWeight:500}}>
          {filtered.length} thông báo{isFiltered ? ' · đã lọc' : ''}
        </span>
        <button style={{
          fontSize:11, fontWeight:700, color:'#15674C',
          background:'none', border:'none', cursor:'pointer',
          display:'flex', alignItems:'center', gap:4, padding:'4px 0',
          transition:'opacity .12s',
        }}
          onMouseEnter={e=>e.currentTarget.style.opacity='.7'}
          onMouseLeave={e=>e.currentTarget.style.opacity='1'}
        >
          Xem tất cả <ILink/>
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   APP
══════════════════════════════════════════ */
function App() {
  return (
    <div style={{width:'100vw', height:'100vh', position:'relative', overflow:'hidden'}}>
      <MockApex/>
      <NotifPanel/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
