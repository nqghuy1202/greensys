<!-- ============================================================
  notif-panel.html
  Page 0 → Region "Notification Drawer" → Source (Static Content)
  Region position: After Header
  ============================================================ -->

<!-- Bell button — đặt vào header region của Page 0 -->
<button type="button"
        id="notif-bell-btn"
        class="t-Button t-Button--noUI"
        aria-label="Thông báo"
        aria-expanded="false"
        onclick="window.notifToggle()"
        style="position:relative;padding:6px;line-height:0;">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
  </svg>
  <span id="notif-bell-badge"
        style="
          position:absolute;top:2px;right:2px;
          min-width:16px;height:16px;padding:0 4px;
          background:#D81F25;color:#fff;
          font-size:10px;font-weight:700;line-height:16px;
          border-radius:8px;text-align:center;
          border:1.5px solid #fff;
          display:none;
        ">0</span>
</button>

<!-- Overlay -->
<div id="notif-overlay" onclick="window.notifClose()"></div>

<!-- Drawer container — React mount point -->
<div id="notif-root" aria-label="Thông báo" aria-hidden="true" role="complementary"></div>
