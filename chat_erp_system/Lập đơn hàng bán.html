<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>Lập đơn hàng bán — Redesign</title>
<link rel="stylesheet" href="order-styles.css" />
<style>
  html, body { margin:0; padding:0; height:100%; background:#0f1720; font-family: "Inter", sans-serif; }
  body { overflow: hidden; }
  .dc-host { width: 100vw; height: 100vh; }
  /* tiny adjustments so artboards look right inside the canvas */
  .order-artboard { width:100%; height:100%; overflow:hidden; background:#F4F6F8; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="order-data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="order-shared.jsx"></script>
<script type="text/babel" src="order-option-a.jsx"></script>
<script type="text/babel" src="order-option-b.jsx"></script>
<script type="text/babel" src="order-option-c.jsx"></script>
</head>
<body>
<div id="root" class="dc-host"></div>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "focus": "all",
  "showWorkflow": true
}/*EDITMODE-END*/;

const App = () => {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  const ABoard = (
    <window.DCArtboard id="optA" label="Option A — Refined ERP" width={1920} height={1080}>
      <div className="order-artboard"><window.OrderOptionA /></div>
    </window.DCArtboard>
  );
  const BBoard = (
    <window.DCArtboard id="optB" label="Option B — Workspace with Tabs" width={1920} height={1080}>
      <div className="order-artboard"><window.OrderOptionB /></div>
    </window.DCArtboard>
  );
  const CBoard = (
    <window.DCArtboard id="optC" label="Option C — Document-first" width={1920} height={1080}>
      <div className="order-artboard"><window.OrderOptionC /></div>
    </window.DCArtboard>
  );

  return (
    <>
      <window.DesignCanvas defaultZoom={0.55}>
        <window.DCSection id="orders" title="Lập đơn hàng bán — 3 phương án">
          {ABoard}
          {BBoard}
          {CBoard}
        </window.DCSection>
      </window.DesignCanvas>

      <window.TweaksPanel>
        <window.TweakSection title="Hướng dẫn">
          <div style={{fontSize:12, color:'#4A5560', lineHeight:1.5}}>
            Click vào artboard rồi nhấn nút mở rộng (góc trên-phải) để xem fullscreen. Dùng phím <b>←/→</b> để chuyển giữa các phương án, <b>Esc</b> để thoát.
          </div>
        </window.TweakSection>
      </window.TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
