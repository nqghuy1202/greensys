<!-- ============ MES Control Tower — Header + KPIs ============ -->
<header class="mes-header">

  <!-- ---------- Top nav bar ---------- -->
  <div class="mes-topbar">
    <div class="mes-topbar__left">
      <button type="button" class="topbar-burger" aria-label="Menu">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M4 6h16M4 12h16M4 18h16" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <span class="topbar-brand">MES Control Tower</span>
      <nav class="topbar-crumb" aria-label="Breadcrumb">
        <span>Factory A</span>
        <span class="topbar-crumb__sep">›</span>
        <span>Workshop 1</span>
        <span class="topbar-crumb__sep">›</span>
        <span class="topbar-crumb__cur">Line 02</span>
      </nav>
    </div>

    <div class="mes-topbar__right">
      <div class="topbar-search">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M16.5 16.5L21 21" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input type="text" placeholder="Search PO, Machine, Product…">
      </div>

      <button type="button" class="topbar-icon" aria-label="Notifications">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="topbar-icon__dot"></span>
      </button>

      <button type="button" class="topbar-icon" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button type="button" class="topbar-user">
        <span class="topbar-user__avatar">JS</span>
        <span class="topbar-user__meta">
          <span class="topbar-user__name">J. Smith</span>
          <span class="topbar-user__role">Plant Mgr</span>
        </span>
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path d="M6 9l6 6 6-6" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ---------- KPI strip ---------- -->
  <div class="kpi-strip">

    <!-- Time horizon -->
    <div class="kpi kpi--wide">
      <span class="kpi__label">Time Horizon</span>
      <span class="kpi__value-row">
        <span class="kpi__value">Aug 24, 08:00 - 17:00</span>
        <svg class="kpi__edit" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
          <path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>

    <span class="kpi-div"></span>

    <!-- Orders -->
    <div class="kpi">
      <span class="kpi__label">Orders (Total/Run/Dly)</span>
      <span class="kpi__value kpi__value--lg">
        142 <span class="kpi__sep">/</span>
        <span class="is-run">38</span> <span class="kpi__sep">/</span>
        <span class="is-dly">10</span>
      </span>
    </div>

    <span class="kpi-div"></span>

    <!-- Qty -->
    <div class="kpi">
      <span class="kpi__label">Qty (Plan vs Act)</span>
      <span class="kpi__value kpi__value--lg">
        45.2k <span class="kpi__muted">/ 48.0k</span>
      </span>
      <span class="kpi__bar"><span class="kpi__bar-fill" style="width:60%"></span></span>
    </div>

    <span class="kpi-div"></span>

    <!-- Percent metrics -->
    <div class="kpi-metrics">
      <div class="kpi-metric is-green">
        <span class="kpi-metric__label">Yield %</span>
        <span class="kpi-metric__value">98.5%</span>
      </div>
      <div class="kpi-metric is-orange">
        <span class="kpi-metric__label">OEE %</span>
        <span class="kpi-metric__value">84.2%</span>
      </div>
      <div class="kpi-metric is-red">
        <span class="kpi-metric__label">
          <svg viewBox="0 0 24 24" width="11" height="11" aria-hidden="true">
            <path d="M12 3L2 20h20L12 3zM12 10v4M12 17v.5" fill="none"
                  stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          SA%
        </span>
        <span class="kpi-metric__value">92.4%</span>
      </div>
      <div class="kpi-metric is-blue">
        <span class="kpi-metric__label">FCST %</span>
        <span class="kpi-metric__value">98.5%</span>
      </div>
      <div class="kpi-metric is-brown">
        <span class="kpi-metric__label">Util %</span>
        <span class="kpi-metric__value">52.1%</span>
      </div>
    </div>

  </div>
</header>
